# ==========================================
# Stake.com 实时监控 - 配置文件
# ==========================================

# 目标监控页面
target:
  url: "https://stake.com/sports/live"
  # 可监控的页面:
  #   https://stake.com/sports/live          - 体育直播
  #   https://stake.com/sports/upcoming      - 即将开始
  #   https://stake.com/casino/games/crash   - Crash 游戏
  #   https://stake.com/casino/games/roulette - 轮盘

# 浏览器设置
browser:
  headless: false               # false = 可见浏览器（调试用），true = 无头模式
  channel: "chrome"             # chrome / msedge
  slow_mo: 100                  # 操作间隔毫秒（防检测）
  viewport_width: 1920
  viewport_height: 1080
  timeout: 60000                # 页面加载超时(ms)
  locale: "en-US"               # 浏览器语言
  timezone_id: "UTC"
  proxy: ""  # 代理地址（留空则使用系统代理或不使用代理）
  nav_retries: 3                # 页面导航重试次数
  user_data_dir: "./browser_profile"  # 持久化用户目录，留空=不复用（CDP模式忽略此项）
  cdp_port: 9222                # CDP远程调试端口（连接已有浏览器；设为0=使用内置浏览器）

# 采集设置
scraper:
  poll_interval: 30             # 数据轮询间隔(秒) - 风云榜数据更新较慢
  wait_for_selector: ".sports-live-events"  # 等待此元素出现才采集
  ready_timeout: 120            # 等待页面就绪超时(秒)，含 Cloudflare 验证

# ==========================================
# 通知配置
# ==========================================
notifications:
  enabled: true

  # 企业微信机器人 Webhook
  wecom:
    enabled: true
    webhook_url: "${WECOM_WEBHOOK_URL}"

  # 钉钉机器人 Webhook
  dingtalk:
    enabled: false
    webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_HERE"

  # 触发条件
  rules:
    pass_all: false             # 关闭，仅通知大额
    cny_threshold: 20000        # 大额记录阈值(人民币)
    single_notify_threshold: 100000  # 单笔大额独立通知阈值(人民币)

# ==========================================
# 跟注聚类检测
# ==========================================
clustering:
  enabled: true                   # 是否启用聚类检测
  min_count: 3                    # 同一(event+market+outcome)累积N条时触发通知
  step: 1                         # 之后每增加step条再通知一次
  window_hours: 24                # 仅统计最近N小时内的大额投注，0=不限

# ==========================================
# 项目类别白名单
# ==========================================
filters:
  sport_categories:
    - "counter-strike"
    - "dota-2"
    - "league-of-legends"       # 仅记录这些项目类别的大额投注
  exclude_live: true              # 默认过滤掉滚球盘(实时)投注

# 日志设置
logging:
  level: "INFO"                 # DEBUG / INFO / WARNING / ERROR
  file: "monitor.log"           # 日志文件路径
